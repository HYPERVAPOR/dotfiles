# ==========================================
# ~/.tmux.conf — Community Best Practices
# ==========================================

# 前缀键改为 Alt+a（零冲突，任何终端都可用）
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# --- tmux-sensible 核心优化（内联）---
# 支持 focus-events（nvim 需要这个来触发 BufLeave 等事件）
set -g focus-events on

# 消除 Esc 延迟（nvim 用户刚需，否则按 Esc 会卡顿）
set -s escape-time 0

# 窗口/面板从 1 开始编号（0 太远）
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# 历史记录
set -g history-limit 50000

# 鼠标支持（滚动、选中文本、拖拽面板）
set -g mouse on

# 颜色支持（真彩色，配合 nvim 主题）
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- 基础键位 ---
# 重载配置
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 新建窗口保留当前路径
bind c new-window -c "#{pane_current_path}"

# 分屏（极简，保留路径）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 面板导航（vim 风格，和 nvim 一致）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 最大化/恢复面板
bind z resize-pane -Z

# 关闭面板/窗口（不提示）
bind x kill-pane
bind & kill-window

# 快速切换上/下一个窗口（不需要前缀键）
bind -n M-h previous-window
bind -n M-l next-window

# --- 复制模式（vim 风格）---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# --- 状态栏（极简但有信息）---
set -g status-position bottom
set -g status-style bg=default,fg=white
set -g status-left " #S "
set -g status-right " %H:%M "
set -g status-left-length 20
set -g status-right-length 20
setw -g window-status-current-style bg=blue,fg=black,bold
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
set -g status-interval 5

# --- 插件 ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'

# 自动保存/恢复会话（continuum + resurrect）
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# 初始化 tpm（必须放最后）
run '~/.tmux/plugins/tpm/tpm'
